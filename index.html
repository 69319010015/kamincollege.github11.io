<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreetDrive | Premium Automotive Showcase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --premium-dark: #0f172a;
            --premium-surface: #1e293b;
            --accent-blue: #38bdf8;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--premium-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, .navbar-brand {
            font-family: 'Poppins', sans-serif;
        }

        /* Navbar Styling */
        .navbar {
            background-color: rgba(15, 23, 42, 0.95) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .navbar-brand {
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main) !important;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-blue), #0ea5e9);
            border-radius: 8px;
            display: inline-block;
        }

        /* Brand Selector */
        .brand-container {
            padding: 3rem 0;
        }

        .brand-btn {
            background-color: var(--premium-surface);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .brand-btn:hover {
            color: var(--text-main);
            background-color: #2d3a4f;
            transform: translateY(-3px);
            border-color: var(--accent-blue);
        }

        .brand-btn.active {
            background-color: var(--accent-blue);
            color: #0f172a;
            border-color: var(--accent-blue);
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.3);
        }

        /* Carousel Customization */
        .carousel-main {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto 5rem auto;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            background: #000;
        }

        .carousel-item {
            height: 600px;
            background-color: #000;
        }

        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.85);
        }

        .carousel-caption {
            bottom: 0;
            left: 0;
            right: 0;
            text-align: left;
            padding: 4rem 3rem 3rem 3rem;
            background: linear-gradient(to top, rgba(15, 23, 42, 1) 0%, rgba(15, 23, 42, 0.7) 50%, transparent 100%);
            z-index: 10;
        }

        .model-name {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .feature-tag {
            display: inline-block;
            background: var(--accent-blue);
            color: #0f172a;
            padding: 0.25rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        /* Carousel Controls */
        .carousel-control-prev, .carousel-control-next {
            width: 60px;
            height: 60px;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        .carousel-control-prev:hover, .carousel-control-next:hover {
            background: var(--accent-blue);
            opacity: 1;
        }

        @media (max-width: 768px) {
            .carousel-item { height: 450px; }
            .model-name { font-size: 2.2rem; }
            .carousel-caption { padding: 2rem 1.5rem; }
            .brand-btn { padding: 0.75rem 1.25rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body class="bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                <span class="logo-icon"></span> StreetDrive
            </a>
            <div class="d-flex align-items-center text-secondary small">
                The Gold Standard of Automotive Showcases
            </div>
        </div>
    </nav>

    <section class="brand-container container text-center">
        <h2 class="mb-4 fw-bold text-light">Elite Brand Selection</h2>
        <div class="row g-3 justify-content-center" id="brandGrid">
            </div>
    </section>

    <div class="carousel-main">
        <div id="carCarousel" class="carousel slide carousel-fade" data-bs-ride="false">
            <div class="carousel-inner" id="carouselInner">
                </div>
            <button class="carousel-control-prev" type="button" id="prevBtn">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            </button>
            <button class="carousel-control-next" type="button" id="nextBtn">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>

                { name: "Model Y", tag: "Electric Crossover", id: "photo-1619767886558-efdc259cde1a" },

            ],
            BYD: [

                { name: "Han", tag: "Luxury Sedan", id: "photo-1617788138017-80ad40651399" },

                { name: "Seal", tag: "Electric Sedan", id: "photo-1614162692292-7ac56d7f7f1e" },
                { name: "Dolphin", tag: "City EV", id: "photo-1616422285623-13ff0162193c" },
                { name: "Seagull", tag: "Compact EV", id: "photo-1617469767053-d3b508a0d982" },
                { name: "Song", tag: "Electric Crossover", id: "photo-1563720223185-11003d516935" },
                { name: "Qin", tag: "Electric Sedan", id: "photo-1592853625511-ad0edcc69c07" },
                { name: "Yuan", tag: "Electric SUV", id: "photo-1549399542-7e3f8b79c341" },
                { name: "Sealion", tag: "Premium SUV", id: "photo-1669282361021-36ba9012cdbf" }
            ]
        };

        let activeBrand = 'Toyota';
        let carouselInstance = null;

        function init() {
            const brandGrid = document.getElementById('brandGrid');

            Object.keys(CAR_DATA).forEach(brand => {
                const col = document.createElement('div');
                col.className = 'col-6 col-md-2 d-flex justify-content-center';

                const btn = document.createElement('button');
                btn.className = `brand-btn w-100 ${brand === activeBrand ? 'active' : ''}`;
                btn.innerText = brand;
                btn.onclick = () => handleBrandChange(brand);

                col.appendChild(btn);
                brandGrid.appendChild(col);
            });

            updateCarousel();

            document.getElementById('prevBtn').onclick = () => {
                if (carouselInstance) carouselInstance.prev();
            };
            document.getElementById('nextBtn').onclick = () => {
                if (carouselInstance) carouselInstance.next();
            };
        }

        function updateCarousel() {
            const inner = document.getElementById('carouselInner');
            const brandCars = CAR_DATA[activeBrand];

            inner.innerHTML = '';

            brandCars.forEach((car, index) => {
                const item = document.createElement('div');
                item.className = `carousel-item ${index === 0 ? 'active' : ''}`;

                // New reliable Unsplash production CDN link setup
                const imgUrl = `https://images.unsplash.com/${car.id}?auto=format&fit=crop&w=1200&h=700&q=80`;

                item.innerHTML = `
                    <img src="${imgUrl}" alt="${car.name}" class="d-block w-100">
                    <div class="carousel-caption">
                        <div class="feature-tag">${car.tag}</div>
                        <h2 class="model-name">${activeBrand} ${car.name}</h2>
                    </div>
                `;
                inner.appendChild(item);
            });

            if (carouselInstance) {
                carouselInstance.dispose();
            }
            carouselInstance = new bootstrap.Carousel(document.getElementById('carCarousel'), {
                interval: false,
                wrap: true
            });

            carouselInstance.to(0);
        }

        function handleBrandChange(brand) {
            activeBrand = brand;

            document.querySelectorAll('.brand-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === brand);
            });

            updateCarousel();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
